import = ["~/.config/alacritty/gruber_darker.toml"]

live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
decorations = "buttonless"
dynamic_padding = false

[window.padding]
x = 10
y = 10

[font]
size = 17.0

[font.bold]
family = "Fira Code Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "Fira Code Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "Fira Code Nerd Font"
style = "Medium Italic"

[font.normal]
family = "Fira Code Nerd Font"
style = "Medium"
